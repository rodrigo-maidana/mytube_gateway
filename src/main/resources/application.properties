# Application Name and Port
spring.application.name=mytube_gateway
server.port=8080

# Enable debug logging for Gateway
logging.level.root=DEBUG

# Eureka Server Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.leaseRenewalIntervalInSeconds=300
eureka.instance.leaseExpirationDurationInSeconds=600

# Configuracion del Config Server
spring.main.web-application-type=reactive
spring.cloud.config.enabled=false

# Configuracion de CORS Global en Spring Cloud Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false
